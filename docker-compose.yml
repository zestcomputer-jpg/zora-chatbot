version: '3.8'

services:
  zora-chatbot:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PAGE_ACCESS_TOKEN=${PAGE_ACCESS_TOKEN}
      - VERIFY_TOKEN=${VERIFY_TOKEN:-zora_verify_token_2024}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
